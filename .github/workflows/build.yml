name: Build

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'
  workflow_dispatch:
    inputs:
      SIGN_WINDOWS_INSTALLER:
        description: 'Sign Windows Installer'
        required: true
        type: boolean
        default: false

# Only keep the latest run per ref going: a newer push cancels the older,
# still-running build instead of queueing behind it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  # -Dwebrtc-audio-processing=ON is the default, but set explicitly so the AEC3 echo
  # cancellation and noise suppression are guaranteed to be compiled in and linked.
  # -Ddeepfilternet=ON builds the bundled DeepFilterNet3 noise suppressor (via the
  # Rust toolchain that is preinstalled on the GitHub-hosted runners) so it is
  # included in the matrix artifacts, Windows included.
  CMAKE_OPTIONS: -Dtests=ON -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF -Dwebrtc-audio-processing=ON -Ddeepfilternet=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache


jobs:

  fetch_build_number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.fetch.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6
        with:
            fetch-depth: 1
      - id: fetch
        shell: bash
        run: |
          build_version="$("${{ github.workspace }}/scripts/mumble-version.py")"
          build_number="$("${{ github.workspace }}/scripts/mumble-build-number.py" \
            --commit "${{ github.sha }}" --version "${build_version}" \
            --password "${{ secrets.BUILD_NUMBER_TOKEN }}" --default "${{ github.run_number }}")"
          # The central build-number service only assigns numbers for the upstream
          # repository. On forks every build otherwise stayed at build number 0, i.e.
          # the same version (e.g. 1.7.0), so the Windows installer saw no version
          # change and silently refused to update an existing installation. Use the
          # monotonic run number on forks so each build gets a strictly higher version.
          if [ "${{ github.repository }}" != "mumble-voip/mumble" ]; then
            build_number="${{ github.run_number }}"
          fi
          echo "Build Number: ${build_version}.${build_number}"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"


  build:
    needs: [ fetch_build_number ]

    strategy:
        fail-fast: false
        matrix:
            # macOS and FreeBSD are disabled for now to keep CI fast; Linux (static and
            # shared) and Windows (static) cover the supported build configurations.
            os: [ubuntu-22.04, ubuntu-24.04, windows-2025-vs2026]
            type: [static, shared]
            arch: [x86_64]
            exclude:
              - os: windows-2025-vs2026
                type: shared
              - os: ubuntu-22.04
                type: static
            
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
          submodules: 'recursive'
          fetch-depth: 1


    - name: Set environment variables
      run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}" "${{ github.workspace }}"
      shell: bash

    - uses: actions/cache/restore@v5
      with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.base_ref || github.ref_name }}.${{ matrix.os }}.${{ matrix.type }}
        save: ${{ github.event_name != 'pull_request' }}
        append-timestamp: false

    - uses: ./.github/actions/install-dependencies
      with:
          type: ${{ matrix.type }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

    - name: Build
      run: ./.github/workflows/build.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}"
      shell: bash
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}

    - name: Test
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: ctest --output-on-failure -C $BUILD_TYPE

    - if: ${{ inputs.SIGN_WINDOWS_INSTALLER && startsWith(matrix.os, 'windows') }}
      uses: ./.github/actions/sign-binaries
      with:
          signpath-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          build-number: ${{ needs.fetch_build_number.outputs.build_number }}
          type: ${{ matrix.type }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

    - if: ${{ !inputs.SIGN_WINDOWS_INSTALLER && matrix.type == 'static' }}
      name: Publish
      uses: actions/upload-artifact@v7
      with:
        name: 'Mumble-${{ matrix.os }}'
        compression-level: 9
        path: |
          build/mumble
          build/mumble-server
          build/**/mumble*.msi
          build/**/mumble*.exe

      # We don't want to save the build env in a cache on a PR as caches are scoped
      # to branches and while PRs can access caches from the default branch, they
      # can't access the cache of other PRs. Hence, it is kind of a waste to save
      # the cache on a PR
    - if: ${{ matrix.type  == 'static' && github.event_name != 'pull_request' }}
      uses: actions/cache/save@v5
      with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}


  # Build an installable Mumble client .deb on the newer Ubuntu releases that are not
  # available as GitHub runner images, using their official containers. This is a shared
  # build that links against the distribution's system libraries. The server, the 32-bit
  # overlay and the tests are left out to keep the package build self-contained on a bare
  # container (no multilib, no database); the build matrix above covers those.
  package_deb:
    needs: [ fetch_build_number ]

    strategy:
        fail-fast: false
        matrix:
            include:
              - { image: "ubuntu:25.10", label: "ubuntu-25.10" }
              - { image: "ubuntu:26.04", label: "ubuntu-26.04" }

    runs-on: ubuntu-latest
    container: ${{ matrix.image }}

    steps:
      # git (for the recursive submodule checkout) and the build toolchain have to be
      # installed before anything else, as the base image ships none of them. dpkg-dev
      # provides dpkg-shlibdeps, which CPack uses to resolve the package dependencies.
    - name: Install build dependencies
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y --no-install-recommends \
          ca-certificates git cmake ninja-build pkg-config dpkg-dev file python3 \
          build-essential \
          cargo rustc \
          qt6-base-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools libgl-dev \
          libboost-dev libssl-dev \
          libprotobuf-dev protobuf-compiler libprotoc-dev \
          libcap-dev libxi-dev libpoco-dev \
          libasound2-dev libogg-dev libsndfile1-dev libopus-dev \
          libspeechd-dev libavahi-compat-libdnssd-dev appstream

    - uses: actions/checkout@v6
      with:
          submodules: 'recursive'
          fetch-depth: 1

      # The checkout runs as root inside the container, so mark the tree as a safe
      # git directory to avoid "dubious ownership" errors from any later git calls.
    - name: Mark workspace as safe
      shell: bash
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # warnings-as-errors is left off here: these are bleeding-edge distributions with
      # newer compilers, and the goal of this job is to produce a package rather than to
      # gate on warnings (the build matrix above enforces a warning-clean build). Tests
      # are likewise built and run by that matrix, so they are skipped here for speed.
    - name: Configure
      shell: bash
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DCMAKE_UNITY_BUILD=ON \
          -DBUILD_NUMBER="$MUMBLE_BUILD_NUMBER" \
          -Dtests=OFF \
          -Dserver=OFF \
          -Doverlay-xcompile=OFF \
          -Dwarnings-as-errors=OFF \
          -Dwebrtc-audio-processing=ON \
          -Ddeepfilternet=ON \
          -Dstatic=OFF \
          -Ddeb-package=ON
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}

    - name: Build
      shell: bash
      run: cmake --build build --parallel

    - name: Package
      working-directory: build
      shell: bash
      run: cpack -G DEB

    - name: Publish .deb
      uses: actions/upload-artifact@v7
      with:
        name: 'Mumble-${{ matrix.label }}-deb'
        compression-level: 9
        path: build/*.deb
